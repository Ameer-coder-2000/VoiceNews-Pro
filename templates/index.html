<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>VoiceNews Pro · AI Voice Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Gradient Background */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            z-index: -2;
        }

        .gradient-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(100, 80, 200, 0.1);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-50px) rotate(180deg); }
        }

        .container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding: 16px;
            position: relative;
            z-index: 1;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 24px;
            animation: fadeInDown 0.8s ease;
            padding: 0 8px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            display: inline-block;
            background: rgba(100, 80, 200, 0.1);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #6366f1;
            margin-bottom: 16px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 30%, #a855f7 60%, #c084fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #64748b;
            max-width: 90%;
            margin: 0 auto;
        }

        /* Main Card */
        .main-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Voice Visualizer Section */
        .voice-section {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(139, 92, 246, 0.02) 100%);
            padding: 32px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .visualizer {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }

        .mic-container {
            position: relative;
            cursor: pointer;
        }

        .mic-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.1);
            transition: all 0.3s;
        }

        .mic-button-pro {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .mic-button-pro:active {
            transform: scale(0.95);
        }

        .mic-button-pro.listening {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: micPulse 1.5s infinite;
        }

        @keyframes micPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(240, 147, 251, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(240, 147, 251, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(240, 147, 251, 0);
            }
        }

        .mic-icon-pro {
            font-size: 36px;
            color: white;
        }

        .wave-bars {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-top: 16px;
            height: 25px;
        }

        .wave-bars span {
            width: 3px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 2px;
            animation: wave 1s infinite ease-in-out;
        }

        .wave-bars span:nth-child(1) { animation-delay: 0s; height: 8px; }
        .wave-bars span:nth-child(2) { animation-delay: 0.1s; height: 16px; }
        .wave-bars span:nth-child(3) { animation-delay: 0.2s; height: 24px; }
        .wave-bars span:nth-child(4) { animation-delay: 0.3s; height: 20px; }
        .wave-bars span:nth-child(5) { animation-delay: 0.4s; height: 12px; }
        .wave-bars span:nth-child(6) { animation-delay: 0.5s; height: 22px; }
        .wave-bars span:nth-child(7) { animation-delay: 0.6s; height: 14px; }
        .wave-bars span:nth-child(8) { animation-delay: 0.7s; height: 18px; }

        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.5); }
        }

        .mic-status-pro {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
        }

        /* Input Section */
        .input-section-pro {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .or-divider-pro {
            text-align: center;
            color: #64748b;
            font-size: 0.75rem;
            margin: 16px 0;
            position: relative;
        }

        .or-divider-pro::before,
        .or-divider-pro::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
        }

        .or-divider-pro::before { left: 0; }
        .or-divider-pro::after { right: 0; }

        .input-group-pro {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .text-input-pro {
            width: 100%;
            background: #f8f9fa;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            padding: 14px 20px;
            color: #1a1a2e;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .text-input-pro:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .text-input-pro::placeholder {
            color: #64748b;
        }

        .btn-primary-pro {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            width: 100%;
            font-size: 0.95rem;
        }

        .btn-primary-pro:active {
            transform: scale(0.98);
        }

        /* Settings Section - FIXED DROPDOWN TEXT */
        .settings-section-pro {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .settings-grid-pro {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }
        
        .setting-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 14px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .setting-card:active {
            transform: scale(0.99);
        }

        .setting-icon {
            font-size: 20px;
            margin-bottom: 8px;
            display: inline-block;
        }

        .setting-label-pro {
            display: block;
            color: #64748b;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        /* FIXED: Dropdown styles with black text */
        select {
            width: 100%;
            padding: 10px 12px;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            color: #1a1a2e;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231a1a2e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        select option {
            background: #ffffff;
            color: #1a1a2e;
            padding: 12px;
            font-weight: normal;
        }

        select:hover {
            background: #f5f5f5;
            border-color: #6366f1;
        }

        select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* Voice Controls */
        .voice-controls-pro {
            padding: 24px 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            flex-wrap: wrap;
        }

        .btn-secondary-pro {
            background: #f8f9fa;
            border: 1px solid #e2e8f0;
            padding: 12px 20px;
            border-radius: 40px;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            flex: 1;
            justify-content: center;
        }

        .btn-secondary-pro:active {
            transform: scale(0.97);
        }

        .btn-danger-pro {
            background: #fef2f2;
            border-color: #fecaca;
            color: #dc2626;
        }

        /* Response Section */
        .response-section-pro {
            padding: 24px 20px;
            display: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .response-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .response-header i {
            font-size: 20px;
            color: #6366f1;
        }

        .response-header h3 {
            color: #1a1a2e;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .response-content {
            color: #475569;
            line-height: 1.5;
            font-size: 0.85rem;
        }

        /* Articles Section */
        .articles-section-pro {
            padding: 24px 20px;
            display: none;
        }

        .articles-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .articles-header i {
            font-size: 20px;
            color: #6366f1;
        }

        .articles-header h3 {
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: 600;
        }

        .articles-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .article-card-pro {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 18px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }

        .article-card-pro:active {
            transform: scale(0.99);
        }

        .article-title-pro {
            color: #6366f1;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.7rem;
            color: #64748b;
        }

        .article-description-pro {
            color: #64748b;
            font-size: 0.8rem;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .article-link-pro {
            color: #6366f1;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        /* Loading Animation */
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 50%;
            border-top-color: #6366f1;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tablet Optimization */
        @media (min-width: 768px) {
            .container {
                max-width: 700px;
                padding: 24px;
            }
            
            h1 {
                font-size: 3rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .settings-grid-pro {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
            }
            
            .input-group-pro {
                flex-direction: row;
            }
            
            .text-input-pro {
                width: auto;
                flex: 1;
            }
            
            .btn-primary-pro {
                width: auto;
            }
            
            .articles-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            
            .voice-controls-pro {
                flex-wrap: nowrap;
            }
        }

        /* Desktop Optimization */
        @media (min-width: 1024px) {
            .container {
                max-width: 900px;
            }
            
            .articles-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .mic-button-pro {
                width: 100px;
                height: 100px;
            }
            
            .mic-icon-pro {
                font-size: 42px;
            }
        }

        /* RTL Support for Arabic */
        .rtl {
            direction: rtl;
            text-align: right;
        }
        
        .rtl .response-content {
            text-align: right;
        }
        
        .rtl .article-title-pro,
        .rtl .article-description-pro {
            text-align: right;
        }
        
        .rtl .setting-label-pro,
        .rtl .or-divider-pro {
            text-align: right;
        }

        /* Safe area for notched phones */
        @supports (padding: max(0px)) {
            .container {
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
                padding-bottom: max(16px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="header">
            <div class="badge">
                <i class="fas fa-microphone-alt" style="margin-right: 6px;"></i>
                AI-Powered
            </div>
            <h1>
                VoiceNews Pro
            </h1>
            <div class="subtitle">
                Speak naturally, get intelligent news
            </div>
        </div>

        <div class="main-card">
            <!-- Voice Visualizer -->
            <div class="voice-section">
                <div class="visualizer">
                    <div class="mic-container">
                        <div class="mic-ring"></div>
                        <button class="mic-button-pro" id="voice-btn">
                            <i class="fas fa-microphone mic-icon-pro"></i>
                        </button>
                    </div>
                    <div class="wave-bars" id="wave-bars" style="display: none;">
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                    </div>
                </div>
                <div class="mic-status-pro" id="mic-status">Ready to listen</div>
            </div>

            <!-- Input Section -->
            <div class="input-section-pro">
                <div class="or-divider-pro">or type your question</div>
                <div class="input-group-pro">
                    <input type="text" id="text-input" class="text-input-pro" placeholder="e.g., 'Latest AI news'">
                    <button id="text-btn" class="btn-primary-pro">
                        <i class="fas fa-paper-plane" style="margin-right: 6px;"></i>
                        Get News
                    </button>
                </div>
            </div>

            <!-- Settings -->
            <div class="settings-section-pro">
                <div class="settings-grid-pro">
                    <div class="setting-card">
                        <div class="setting-icon">📰</div>
                        <label class="setting-label-pro">CATEGORY</label>
                        <select id="category">
                            <option value="">✨ Auto</option>
                            <option value="general">📰 General</option>
                            <option value="world">🌍 World</option>
                            <option value="business">💼 Business</option>
                            <option value="technology">💻 Technology</option>
                            <option value="sports">⚽ Sports</option>
                            <option value="science">🔬 Science</option>
                            <option value="health">🏥 Health</option>
                            <option value="entertainment">🎬 Entertainment</option>
                        </select>
                    </div>

                    <div class="setting-card">
                        <div class="setting-icon">🌐</div>
                        <label class="setting-label-pro">LANGUAGE</label>
                        <select id="language">
                            <option value="en">🇺🇸 English</option>
                            <option value="ar">🇸🇦 العربية</option>
                            <option value="fr">🇫🇷 French</option>
                            <option value="es">🇪🇸 Spanish</option>
                            <option value="de">🇩🇪 German</option>
                            <option value="it">🇮🇹 Italian</option>
                            <option value="pt">🇵🇹 Portuguese</option>
                            <option value="zh">🇨🇳 Chinese</option>
                            <option value="ja">🇯🇵 Japanese</option>
                            <option value="ko">🇰🇷 Korean</option>
                        </select>
                    </div>

                    <div class="setting-card">
                        <div class="setting-icon">🎵</div>
                        <label class="setting-label-pro">VOICE GENDER</label>
                        <select id="voice-gender">
                            <option value="auto">🤖 Auto</option>
                            <option value="female">👩 Female</option>
                            <option value="male">👨 Male</option>
                        </select>
                    </div>

                    <div class="setting-card">
                        <div class="setting-icon">🎤</div>
                        <label class="setting-label-pro">VOICE</label>
                        <select id="voice">
                            <option value="auto">🎧 Auto</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Voice Controls -->
            <div class="voice-controls-pro">
                <button id="test-voice-btn" class="btn-secondary-pro">
                    <i class="fas fa-volume-up"></i>
                    Test
                </button>
                <button id="stop-voice-btn" class="btn-secondary-pro btn-danger-pro">
                    <i class="fas fa-stop"></i>
                    Stop
                </button>
            </div>

            <!-- Response -->
            <div id="response" class="response-section-pro"></div>

            <!-- Articles -->
            <div id="articles" class="articles-section-pro"></div>
        </div>
    </div>

    <script>
        // DOM Elements
        const voiceBtn = document.getElementById('voice-btn');
        const textBtn = document.getElementById('text-btn');
        const textInput = document.getElementById('text-input');
        const categorySelect = document.getElementById('category');
        const languageSelect = document.getElementById('language');
        const voiceGenderSelect = document.getElementById('voice-gender');
        const voiceSelect = document.getElementById('voice');
        const testVoiceBtn = document.getElementById('test-voice-btn');
        const stopVoiceBtn = document.getElementById('stop-voice-btn');
        const responseDiv = document.getElementById('response');
        const articlesDiv = document.getElementById('articles');
        const micStatus = document.getElementById('mic-status');
        const waveBars = document.getElementById('wave-bars');

        let recognition = null;
        let isListening = false;
        let voices = [];
        let selectedVoice = null;
        let isSpeaking = false;

        stopVoiceBtn.disabled = true;

        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = window.innerWidth < 768 ? 30 : 50;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 2 + 1;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 15}s`;
                particle.style.animationDuration = `${Math.random() * 10 + 10}s`;
                particlesContainer.appendChild(particle);
            }
        }
        createParticles();

        function getFilteredVoices() {
            const selectedLang = languageSelect.value;
            let filtered = voices.filter(voice => voice.lang.startsWith(selectedLang));
            
            // If no voices found for the selected language, try to find any voice that supports it
            if (filtered.length === 0 && selectedLang === 'ar') {
                // Try to find voices that might support Arabic
                filtered = voices.filter(voice => 
                    voice.lang.includes('ar') || 
                    voice.lang.includes('Arabic') ||
                    voice.name.toLowerCase().includes('arabic')
                );
            }
            
            // If still no voices, return all voices as fallback
            if (filtered.length === 0) {
                filtered = voices;
            }
            
            return filtered;
        }

        function loadVoices() {
            voices = speechSynthesis.getVoices();

            while (voiceSelect.options.length > 1) {
                voiceSelect.remove(1);
            }

            const filteredVoices = getFilteredVoices();

            filteredVoices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${voice.name}`;
                voiceSelect.appendChild(option);
            });

            if (!selectedVoice && filteredVoices.length > 0) {
                selectedVoice = filteredVoices[0];
            }
        }

        if ('speechSynthesis' in window && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }
        if ('speechSynthesis' in window) {
            loadVoices();
        }

        voiceSelect.addEventListener('change', function() {
            const filteredVoices = getFilteredVoices();
            if (this.value === 'auto') {
                selectedVoice = null;
                return;
            }
            const selectedIndex = parseInt(this.value, 10);
            selectedVoice = filteredVoices[selectedIndex] || null;
        });

        languageSelect.addEventListener('change', function() {
            loadVoices(); // Reload voices when language changes
            selectedVoice = null;
            
            // Apply RTL class for Arabic
            const isArabic = this.value === 'ar';
            document.body.classList.toggle('rtl', isArabic);
            
            // Update placeholder text based on language
            textInput.placeholder = isArabic ? 'مثلاً: آخر أخبار الذكاء الاصطناعي' : "e.g., 'Latest AI news'";
        });

        testVoiceBtn.addEventListener('click', function() {
            speakResponse('Hello! Your voice assistant is ready.');
        });

        stopVoiceBtn.addEventListener('click', function() {
            stopSpeech();
        });

        function stopSpeech() {
            if (!('speechSynthesis' in window)) return;
            if (speechSynthesis.speaking || speechSynthesis.pending) {
                speechSynthesis.cancel();
            }
            isSpeaking = false;
            stopVoiceBtn.disabled = true;
            // Stop background audio
            if (window.backgroundAudio) {
                window.backgroundAudio.stop();
            }
        }

        function findVoiceByGender(gender) {
            const filteredVoices = getFilteredVoices();
            if (!filteredVoices.length) return null;

            const femaleRegex = /female|woman|zira|susan|amy|karen|victoria|alloy|sophia|emma|ava|bella|linda|angelina/i;
            const maleRegex = /male|man|david|michael|alex|john|henry|thomas|paul|daniel|robert|robbie/i;

            if (gender === 'female') {
                return filteredVoices.find(voice => femaleRegex.test(voice.name) || femaleRegex.test(voice.voiceURI)) || filteredVoices[0];
            }
            if (gender === 'male') {
                return filteredVoices.find(voice => maleRegex.test(voice.name) || maleRegex.test(voice.voiceURI)) || filteredVoices[0];
            }

            const femaleVoice = filteredVoices.find(voice => femaleRegex.test(voice.name) || femaleRegex.test(voice.voiceURI));
            return femaleVoice || filteredVoices[0];
        }

        function speakResponse(text) {
            if (!('speechSynthesis' in window)) return;
            stopSpeech();

            // Start background ambient sound
            if (window.backgroundAudio) {
                window.backgroundAudio.startNewsAmbient();
            }

            const utterance = new SpeechSynthesisUtterance(text);
            const gender = voiceGenderSelect.value;
            const selectedLang = languageSelect.value;

            // Adjust speech parameters for Arabic
            if (gender === 'male') utterance.rate = 0.94;
            else if (gender === 'female') utterance.rate = 0.88;
            else utterance.rate = 0.9;

            utterance.pitch = 1.0;
            utterance.volume = 0.95;

            // Set language with better Arabic support
            if (selectedLang === 'ar') {
                utterance.lang = 'ar-SA';
                // For Arabic, try to find any available voice first
                const arabicVoices = voices.filter(voice => 
                    voice.lang.startsWith('ar') || 
                    voice.lang.includes('Arabic') ||
                    voice.name.toLowerCase().includes('arabic')
                );
                
                if (arabicVoices.length > 0) {
                    utterance.voice = arabicVoices[0];
                    console.log('Using Arabic voice:', arabicVoices[0].name);
                } else {
                    // Fallback to any voice with Arabic language setting
                    utterance.voice = voices[0]; // Use first available voice
                    console.log('No Arabic voice found, using fallback voice with ar-SA language');
                }
            } else {
                utterance.lang = 'en-US';
                if (selectedVoice) utterance.voice = selectedVoice;
                else utterance.voice = findVoiceByGender(gender);
            }

            utterance.onstart = () => {
                isSpeaking = true;
                stopVoiceBtn.disabled = false;
                // Fade in background audio
                if (window.backgroundAudio) {
                    setTimeout(() => window.backgroundAudio.fadeIn(), 100);
                }
            };
            utterance.onend = () => {
                isSpeaking = false;
                stopVoiceBtn.disabled = true;
                // Stop background audio
                if (window.backgroundAudio) {
                    window.backgroundAudio.stop();
                }
            };
            utterance.onerror = () => {
                isSpeaking = false;
                stopVoiceBtn.disabled = true;
                // Stop background audio on error
                if (window.backgroundAudio) {
                    window.backgroundAudio.stop();
                }
            };

            speechSynthesis.speak(utterance);
        }

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            recognition.maxAlternatives = 1;
            
            // Increase sensitivity thresholds for better detection
            try {
                recognition.maxAlternatives = 1;
            } catch (e) {
                console.log('Note: Some speech recognition settings may not be available');
            }

            let listeningTimeout;
            let audioDetected = false;

            recognition.onstart = function() {
                audioDetected = false;
                isListening = true;
                voiceBtn.classList.add('listening');
                waveBars.style.display = 'flex';
                micStatus.innerHTML = '<i class="fas fa-circle" style="color: #ef4444; font-size: 8px; margin-right: 6px;"></i> Listening...';
                showResponse('🎤 Listening... Speak clearly.', false);
                console.log('🎤 Speech recognition started - listening for speech');
                
                // Set timeout to detect if no speech is detected after 15 seconds
                listeningTimeout = setTimeout(() => {
                    console.warn('⏱️ Timeout - no speech detected for 15 seconds');
                    if (isListening) {
                        recognition.stop();
                    }
                }, 15000);
            };

            recognition.onresult = function(event) {
                audioDetected = true;
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                console.log('📝 Speech recognized:', transcript, 'Final:', event.results[event.results.length - 1].isFinal);

                if (event.results[event.results.length - 1].isFinal) {
                    textInput.value = transcript;
                    getNews(transcript);
                    recognition.stop();
                } else {
                    textInput.value = transcript + '...';
                }
            };

            recognition.onerror = function(event) {
                clearTimeout(listeningTimeout);
                console.error('❌ Speech recognition error:', event.error);
                
                let errorMsg = '⚠️ Error: ' + event.error;
                let details = '';
                
                if (event.error === 'no-speech') {
                    errorMsg = '⚠️ No speech detected';
                    details = '<p style="font-size: 0.9rem; margin-top: 8px; color: #cbd5e1;"><strong>Troubleshooting:</strong><br>1. Make sure microphone is enabled (click 🔒 in address bar)<br>2. Speak clearly and at normal volume<br>3. Close other apps using the microphone<br>4. Try Google Chrome or Edge browser<br>5. Use text input button if voice fails →</p>';
                } else if (event.error === 'audio-capture') {
                    errorMsg = '⚠️ Microphone not accessible';
                    details = '<p style="font-size: 0.9rem; margin-top: 8px; color: #cbd5e1;">Please grant microphone permission:<br>1. Click the lock/camera icon in the address bar<br>2. Set Microphone to "Allow"<br>3. Refresh the page and try again</p>';
                } else if (event.error === 'network') {
                    errorMsg = '⚠️ Network error in speech recognition service';
                } else if (event.error === 'permission-denied') {
                    errorMsg = '⚠️ Microphone permission denied';
                    details = '<p style="font-size: 0.9rem; margin-top: 8px; color: #cbd5e1;">Please enable microphone access in browser settings and try again.</p>';
                }
                
                showResponse(errorMsg + (details || ''), true);
                resetVoiceButton();
            };

            recognition.onend = function() {
                clearTimeout(listeningTimeout);
                console.log('🛑 Speech recognition ended');
                resetVoiceButton();
            };
        } else {
            voiceBtn.disabled = true;
            micStatus.innerHTML = '❌ Voice not supported';
            console.error('❌ Web Speech API not supported in this browser');
        }

        function resetVoiceButton() {
            isListening = false;
            voiceBtn.classList.remove('listening');
            waveBars.style.display = 'none';
            micStatus.innerHTML = '<i class="fas fa-microphone" style="margin-right: 6px;"></i> Tap to speak';
        }

        voiceBtn.addEventListener('click', async function() {
            if (!recognition) return;
            
            if (isListening) {
                recognition.stop();
                return;
            }
            
            // Check microphone permission first
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Permission granted, close the stream and start recognition
                stream.getTracks().forEach(track => track.stop());
                recognition.start();
            } catch (error) {
                console.error('❌ Microphone permission error:', error.name);
                if (error.name === 'NotAllowedError') {
                    showResponse('⚠️ Microphone permission denied. Please enable it in browser settings (click 🔒 icon in address bar).', true);
                } else if (error.name === 'NotFoundError') {
                    showResponse('⚠️ No microphone detected. Please check your audio devices.', true);
                } else {
                    showResponse('⚠️ Microphone error: ' + error.message, true);
                }
            }
        });

        textBtn.addEventListener('click', function() {
            const query = textInput.value.trim();
            if (query) getNews(query);
            else showResponse('Please enter a question first.', true);
        });

        textInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') textBtn.click();
        });

        function getNews(query) {
            stopSpeech();
            showResponse('<div class="loading-spinner"></div> Fetching news...', false);
            articlesDiv.style.display = 'none';

            const category = categorySelect.value;
            const language = languageSelect.value;

            fetch('/get_news', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, category, language })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const displayText = data.display_summary || data.summary || 'No summary available';
                    const voiceText = data.voice_summary || data.summary || displayText;
                    showResponse(displayText, false);
                    showArticles(data.articles);
                    speakResponse(voiceText);
                } else {
                    showResponse('❌ Error: ' + data.error, true);
                }
            })
            .catch(error => {
                showResponse('❌ Network error. Check connection.', true);
            });
        }

        function showResponse(text, isError) {
            responseDiv.innerHTML = `
                <div class="response-header">
                    <i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-robot'}"></i>
                    <h3>${isError ? 'Error' : 'AI Response'}</h3>
                </div>
                <div class="response-content">${text}</div>
            `;
            responseDiv.style.display = 'block';
        }

        function showArticles(articles) {
            let html = `
                <div class="articles-header">
                    <i class="fas fa-newspaper"></i>
                    <h3>Latest Articles</h3>
                </div>
                <div class="articles-grid">
            `;
            articles.forEach((article, index) => {
                html += `
                    <div class="article-card-pro">
                        <div class="article-title-pro">${index + 1}. ${escapeHtml(article.title)}</div>
                        <div class="article-meta">
                            <span><i class="fas fa-building"></i> ${escapeHtml(article.source.name)}</span>
                        </div>
                        <div class="article-description-pro">${escapeHtml(article.description || 'No description')}</div>
                        <a href="${article.url}" target="_blank" class="article-link-pro">
                            Read more <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                `;
            });
            html += `</div>`;
            articlesDiv.innerHTML = html;
            articlesDiv.style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
    <script src="/static/js/background-audio.js"></script>
</body>
</html>
